# Nginx reverse proxy for TAG-Patrolling
# Place at /etc/nginx/sites-available/tag-patrolling.conf and symlink into
# sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Replace `patrol.yourdomain.com` with the real hostname before enabling TLS.

server {
    listen 80;
    server_name patrol.yourdomain.com;

    client_max_body_size 25M; # patrol PDFs can be a few MB; leave headroom

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";
    }
}

# After running certbot (see DEPLOYMENT.md), certbot will add a second
# `server { listen 443 ssl; ... }` block here automatically.
